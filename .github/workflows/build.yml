name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Short commit hash
        id: vars
        run: echo "sha=$(git rev-parse --short=8 ${{ github.sha }})" >> "$GITHUB_OUTPUT"

      - name: Build with Maven
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.TOKEN }}
        run: mvn -B package --file pom.xml --settings $GITHUB_WORKSPACE/.github/maven-settings.xml

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: cannons-bukkit-${{ steps.vars.outputs.sha }}
          path: cannons-bukkit/target/*.jar
          if-no-files-found: error
          retention-days: 30
